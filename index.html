<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Finance AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ఏఐ రెస్పాన్స్ ని హైలైట్ చేయడానికి చిన్న స్టైల్స్ */
        .ai-sentiment { color: #38bdf8; font-weight: 800; letter-spacing: 1px; }
        .ai-truth { color: #e2e8f0; font-weight: 600; margin-top: 8px;}
        .ai-action { color: #34d399; font-weight: 700; margin-top: 8px;}
        .ai-risk { color: #f87171; font-style: italic; margin-top: 8px; font-size: 0.9em;}
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans min-h-screen">
    <div id="app" class="max-w-4xl mx-auto p-4">
        <nav class="flex justify-between items-center py-6 border-b border-slate-800 mb-8">
            <div class="flex items-center gap-2">
                <i data-lucide="activity" class="text-cyan-400"></i>
                <h1 class="text-xl font-bold text-white tracking-tight">Quantum Finance AI</h1>
            </div>
        </nav>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl mb-8">
            <div class="flex gap-2 mb-6">
                <input type="text" id="symbolInput" placeholder="Enter Symbol (e.g., AAPL, TSLA)" 
                    class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 w-full text-white focus:outline-none focus:border-cyan-500 transition-all uppercase">
                <button onclick="fetchStock()" id="fetchBtn" class="bg-cyan-500 text-slate-950 font-bold px-6 py-3 rounded-xl hover:bg-cyan-400 transition-all flex items-center gap-2">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="text-center py-10 border-t border-slate-800/50">
                <h2 id="displaySymbol" class="text-slate-500 text-xs uppercase tracking-[0.3em] mb-2">LIVE DATA FEED</h2>
                <div id="priceDisplay" class="text-6xl font-black text-white tracking-tighter mb-2">$0.00</div>
                <div id="changeDisplay" class="text-sm font-mono text-emerald-400">0.00%</div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl mb-8">
            <h3 class="text-cyan-400 font-bold mb-4 flex items-center gap-2">
                <i data-lucide="bot"></i> Advanced AI Profiling
            </h3>
            <div class="flex gap-2">
                <input type="text" id="aiQuery" placeholder="What's your move? (e.g., Should I buy?)" 
                    class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 w-full text-white focus:outline-none focus:border-cyan-500">
                <button onclick="askGemini()" class="bg-cyan-500 text-black px-4 py-2 rounded-xl font-bold">Analyze</button>
            </div>
            <div id="aiResponse" class="mt-6 text-sm text-slate-300 leading-relaxed border-t border-slate-800/50 pt-4 whitespace-pre-line hidden"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // నీ Alpha Vantage కీ ఇక్కడ పెట్టుకో
        const ALPHA_KEY = "నీ_ఆల్ఫా_వాంటేజ్_కీ_ఇక్కడ_పెట్టు"; 

        async function fetchStock() {
            const symbol = document.getElementById('symbolInput').value.toUpperCase() || 'IBM';
            const btn = document.getElementById('fetchBtn');
            btn.innerHTML = 'Wait...';
            try {
                const response = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${ALPHA_KEY}`);
                const data = await response.json();
                if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
                    const price = parseFloat(data["Global Quote"]["05. price"]).toFixed(2);
                    const change = data["Global Quote"]["10. change percent"];
                    document.getElementById('displaySymbol').innerText = `${symbol} LIVE DATA`;
                    document.getElementById('priceDisplay').innerText = `$${price}`;
                    
                    const changeEl = document.getElementById('changeDisplay');
                    changeEl.innerText = change;
                    changeEl.className = change.includes('-') ? "text-sm font-mono text-rose-400" : "text-sm font-mono text-emerald-400";
                } else {
                    document.getElementById('priceDisplay').innerText = "Limit Reached";
                }
            } catch (e) { console.error(e); }
            btn.innerHTML = 'Search';
        }

        async function askGemini() {
            const userQuery = document.getElementById('aiQuery').value;
            const resDiv = document.getElementById('aiResponse');
            
            if (!userQuery) return;

            const symbolText = document.getElementById('displaySymbol').innerText.split(' ')[0]; 
            const priceText = document.getElementById('priceDisplay').innerText; 
            const changeText = document.getElementById('changeDisplay').innerText; 

            // ద బ్రూటల్ సైకలాజికల్ ప్రాంప్ట్ (The Brutal Psychological Prompt)
            let fullPrompt = "";
            if (priceText !== "$0.00" && priceText !== "Limit Reached") {
                fullPrompt = `You are a ruthless, highly accurate, no-nonsense Wall Street AI analyst. Do not use pleasantries. I am analyzing the stock: ${symbolText}. Current price: ${priceText}, Today's change: ${changeText}. The user's query is: "${userQuery}". 
                Analyze this using advanced market psychology and technical realities. Your response MUST be strictly formatted in these 4 lines exactly (do not add any intro or outro text):
                🎯 SENTIMENT: [State clearly if it is Bullish, Bearish, or Neutral]
                🧠 THE BRUTAL TRUTH: [1-2 sentences explaining the cold, logical reality behind this stock's current situation, cutting through the market noise]
                ⚡ ACTIONABLE ADVICE: [Clear, direct, merciless advice on what a rational trader should do right now regarding the user's query]
                ⚠️ RISK WARNING: [A brutal reality check about the downside risk to keep their greed in check]`;
            } else {
                fullPrompt = `You are a ruthless, no-nonsense financial AI. The user asked: "${userQuery}". Give a brutal, logical, and highly actionable response. Cut the fluff.`;
            }

            resDiv.style.display = "block";
            resDiv.innerText = "Analyzing market psychology and raw data...";
            
            try {
                const response = await fetch('/.netlify/functions/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: fullPrompt }) 
                });
                
                const data = await response.json();
                
                if(data.error) {
                     resDiv.innerText = "Error: " + data.error;
                } else if(data.candidates && data.candidates[0]) {
                     // గూగుల్ నుండి వచ్చిన టెక్స్ట్ ని అలాగే ప్రింట్ చేస్తున్నాం
                     resDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                     resDiv.innerText = "Data missing. API failed.";
                }
            } catch (e) { 
                resDiv.innerText = "System Failure! Check Network."; 
            }
        }
    </script>
</body>
</html>
