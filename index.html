<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Finance AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-300 font-sans min-h-screen">
    <div id="app" class="max-w-4xl mx-auto p-4">
        <nav class="flex justify-between items-center py-6 border-b border-slate-800 mb-8">
            <div class="flex items-center gap-2">
                <i data-lucide="activity" class="text-cyan-400"></i>
                <h1 class="text-xl font-bold text-white tracking-tight">Quantum Finance AI</h1>
            </div>
        </nav>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl mb-8">
            <div class="flex gap-2 mb-6">
                <input type="text" id="symbolInput" placeholder="Enter Symbol (e.g., AAPL, TSLA)" 
                    class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 w-full text-white focus:outline-none focus:border-cyan-500 transition-all">
                <button onclick="fetchStock()" id="fetchBtn" class="bg-cyan-500 text-slate-950 font-bold px-6 py-3 rounded-xl hover:bg-cyan-400 transition-all flex items-center gap-2">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="text-center py-10 border-t border-slate-800/50">
                <h2 id="displaySymbol" class="text-slate-500 text-xs uppercase tracking-[0.3em] mb-2">LIVE DATA FEED</h2>
                <div id="priceDisplay" class="text-6xl font-black text-white tracking-tighter mb-2">$0.00</div>
                <div id="changeDisplay" class="text-sm font-mono text-emerald-400">0.00%</div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl mb-8">
            <h3 class="text-cyan-400 font-bold mb-4 flex items-center gap-2">
                <i data-lucide="bot"></i> Gemini AI Analysis
            </h3>
            <div class="flex gap-2">
                <input type="text" id="aiQuery" placeholder="Ask AI about stocks..." 
                    class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 w-full text-white focus:outline-none focus:border-cyan-500">
                <button onclick="askGemini()" class="bg-cyan-500 text-black px-4 py-2 rounded-xl font-bold">Ask</button>
            </div>
            <div id="aiResponse" class="mt-4 text-sm text-slate-400 italic"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // నీ Alpha Vantage కీ ఇక్కడ పెట్టుకో (ఇది ఫ్రంట్ ఎండ్ కాబట్టి సేఫ్ కాదు, కానీ ప్రస్తుతానికి వర్క్ అవ్వడానికి ఉంచు)
        const ALPHA_KEY = "నీ_ఆల్ఫా_వాంటేజ్_కీ_ఇక్కడ_పెట్టు"; 

        async function fetchStock() {
            const symbol = document.getElementById('symbolInput').value.toUpperCase() || 'IBM';
            const btn = document.getElementById('fetchBtn');
            btn.innerHTML = 'Wait...';
            try {
                const response = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${ALPHA_KEY}`);
                const data = await response.json();
                if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
                    const price = parseFloat(data["Global Quote"]["05. price"]).toFixed(2);
                    const change = data["Global Quote"]["10. change percent"];
                    document.getElementById('displaySymbol').innerText = `${symbol} LIVE DATA`;
                    document.getElementById('priceDisplay').innerText = `$${price}`;
                    document.getElementById('changeDisplay').innerText = change;
                } else {
                    document.getElementById('priceDisplay').innerText = "Limit Reached";
                }
            } catch (e) { console.error(e); }
            btn.innerHTML = 'Search';
        }

        async function askGemini() {
            const query = document.getElementById('aiQuery').value;
            const resDiv = document.getElementById('aiResponse');
            if (!query) return;
            resDiv.innerText = "Thinking...";
            try {
                // ఇక్కడ మనం నేరుగా గూగుల్ ని కాకుండా మన నెట్లిఫై సర్వర్ ని అడుగుతున్నాం
                const response = await fetch('/.netlify/functions/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const data = await response.json();
                if(data.error) {
                     resDiv.innerText = "Error: " + data.error;
                } else if(data.candidates && data.candidates[0]) {
                     resDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                     resDiv.innerText = "Gemini Error!";
                }
            } catch (e) { 
                resDiv.innerText = "Network Error!"; 
            }
        }
    </script>
</body>
</html>
