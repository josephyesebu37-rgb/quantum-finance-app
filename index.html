<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Finance AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-slate-950 text-slate-300 font-sans min-h-screen pb-20">
    <div id="app" class="max-w-4xl mx-auto p-4">
        <nav class="flex justify-between items-center py-6 border-b border-slate-800 mb-8">
            <div class="flex items-center gap-2">
                <i data-lucide="activity" class="text-cyan-400"></i>
                <h1 class="text-xl font-bold text-white tracking-tight">Quantum Finance AI</h1>
            </div>
            <button onclick="toggleLang()" id="langBtn" class="bg-slate-800 border border-slate-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-slate-700 transition">
                <i data-lucide="languages" class="w-4 h-4"></i> <span id="langText">ENGLISH</span>
            </button>
        </nav>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl mb-8">
            <div class="flex gap-2 mb-6">
                <input type="text" id="symbolInput" placeholder="Enter Symbol (e.g., AAPL, TSLA)" 
                    class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 w-full text-white focus:outline-none focus:border-cyan-500 transition-all uppercase">
                <button onclick="fetchStock()" id="fetchBtn" class="bg-cyan-500 text-slate-950 font-bold px-6 py-3 rounded-xl hover:bg-cyan-400 transition-all flex items-center gap-2">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="text-center py-6 border-t border-slate-800/50">
                <h2 id="displaySymbol" class="text-slate-500 text-xs uppercase tracking-[0.3em] mb-2">LIVE DATA FEED</h2>
                <div id="priceDisplay" class="text-5xl font-black text-white tracking-tighter mb-2">$0.00</div>
                <div id="changeDisplay" class="text-sm font-mono text-emerald-400">0.00%</div>
            </div>

            <div id="tv_chart_container" class="h-[400px] w-full mt-6 rounded-xl overflow-hidden border border-slate-700 hidden"></div>
        </div>

        <div id="newsContainer" class="mb-8 hidden">
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl flex flex-col h-[500px]">
            <h3 class="text-cyan-400 font-bold mb-4 flex items-center gap-2 shrink-0">
                <i data-lucide="bot"></i> Advanced AI Profiling
            </h3>
            
            <div id="chatHistoryBox" class="flex-1 overflow-y-auto mb-4 border border-slate-800 rounded-xl p-4 bg-slate-950/50 flex flex-col gap-4 text-sm">
                <div class="text-slate-500 italic text-center text-xs">AI Chat initiated. Ask anything.</div>
            </div>

            <div class="flex gap-2 shrink-0">
                <input type="text" id="aiQuery" placeholder="What's your move? (e.g., Should I buy?)" 
                    class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 w-full text-white focus:outline-none focus:border-cyan-500">
                <button onclick="askGemini()" class="bg-cyan-500 text-black px-6 py-3 rounded-xl font-bold">Ask</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        const ALPHA_KEY = "నీ_ఆల్ఫా_వాంటేజ్_కీ_ఇక్కడ_పెట్టు"; 

        let isTelugu = false;
        let conversationMemory = ""; 

        function toggleLang() {
            isTelugu = !isTelugu;
            document.getElementById('langText').innerText = isTelugu ? "తెలుగు" : "ENGLISH";
        }

        // TradingView Black Box Fix
        function loadTradingViewChart(symbol) {
            const outerContainer = document.getElementById('tv_chart_container');
            outerContainer.style.display = "block";
            // పాత iframe ని పూర్తిగా డిస్ట్రాయ్ చేసి, కొత్త ఇన్నర్ డబ్బా పెడుతున్నాం
            outerContainer.innerHTML = '<div id="tv_inner_box" class="h-full w-full"></div>';

            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1", 
                "locale": "en",
                "enable_publishing": false,
                "backgroundColor": "#0f172a", 
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": "tv_inner_box" // కొత్త డబ్బాకి టార్గెట్ చేశాం
            });
        }

        // News API Limit Fix
        async function fetchNews(symbol) {
            const newsContainer = document.getElementById('newsContainer');
            newsContainer.style.display = "block";
            newsContainer.innerHTML = '<p class="text-slate-500 text-sm text-center animate-pulse">లాజికల్ న్యూస్ లాగుతున్నా...</p>';

            try {
                const response = await fetch(`https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers=${symbol}&limit=4&apikey=${ALPHA_KEY}`);
                const data = await response.json();

                // ఏపీఐ లిమిట్ అయిపోయిందా అని ఫస్ట్ చెక్ చేస్తున్నాం
                if (data.Information || data.Note) {
                     newsContainer.innerHTML = '<div class="bg-rose-950/50 border border-rose-900 p-4 rounded-xl"><p class="text-rose-400 text-sm text-center font-bold">⚠️ న్యూస్ ఏపీఐ లిమిట్ అయిపోయింది మావా! రోజుకి 25 సార్లే ఫ్రీ. రేపటి దాకా వెయిట్ చెయ్ లేదా వేరే ఆల్ఫా కీ వాడు.</p></div>';
                     return;
                }

                if (data.feed && data.feed.length > 0) {
                    let newsHTML = `<h3 class="text-cyan-400 font-bold mb-4 flex items-center gap-2 px-2"><i data-lucide="newspaper"></i> Market Reality (News)</h3><div class="grid gap-4 md:grid-cols-2">`;
                    
                    for(let i=0; i<Math.min(4, data.feed.length); i++) {
                        const article = data.feed[i];
                        let sentimentColor = "text-slate-400";
                        if (article.overall_sentiment_label.includes("Bullish")) sentimentColor = "text-emerald-400";
                        if (article.overall_sentiment_label.includes("Bearish")) sentimentColor = "text-rose-400";

                        newsHTML += `
                        <a href="${article.url}" target="_blank" class="bg-slate-900 border border-slate-800 p-4 rounded-xl shadow-lg hover:border-cyan-500 transition block">
                            <h4 class="text-white font-semibold text-sm mb-2 line-clamp-2">${article.title}</h4>
                            <div class="flex justify-between items-center text-xs mt-3">
                                <span class="text-slate-500 font-bold uppercase tracking-wider">${article.source}</span>
                                <span class="${sentimentColor} font-mono bg-slate-950 px-2 py-1 rounded-md border border-slate-800">${article.overall_sentiment_label}</span>
                            </div>
                        </a>`;
                    }
                    newsHTML += `</div>`;
                    newsContainer.innerHTML = newsHTML;
                    lucide.createIcons();
                } else {
                    newsContainer.innerHTML = '<p class="text-slate-500 text-sm text-center">ఈ స్టాక్ కి ప్రస్తుతం ఎలాంటి సెన్సేషన్ లేదు.</p>';
                }
            } catch (e) {
                newsContainer.innerHTML = '<p class="text-rose-400 text-sm text-center">వార్తలు లాగడంలో సర్వర్ క్రాష్ అయింది.</p>';
            }
        }

        async function fetchStock() {
            const symbol = document.getElementById('symbolInput').value.toUpperCase() || 'IBM';
            const btn = document.getElementById('fetchBtn');
            btn.innerHTML = 'Wait...';
            try {
                const response = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${ALPHA_KEY}`);
                const data = await response.json();
                
                if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
                    const price = parseFloat(data["Global Quote"]["05. price"]).toFixed(2);
                    const change = data["Global Quote"]["10. change percent"];
                    document.getElementById('displaySymbol').innerText = `${symbol} LIVE DATA`;
                    document.getElementById('priceDisplay').innerText = `$${price}`;
                    
                    const changeEl = document.getElementById('changeDisplay');
                    changeEl.innerText = change;
                    changeEl.className = change.includes('-') ? "text-sm font-mono text-rose-400" : "text-sm font-mono text-emerald-400";
                    
                    conversationMemory = "";
                    document.getElementById('chatHistoryBox').innerHTML = `<div class="text-slate-500 italic text-center text-xs">Switched to ${symbol}. Memory cleared.</div>`;
                    
                    loadTradingViewChart(symbol);
                    fetchNews(symbol);

                } else if(data["Note"] || data["Information"]) {
                     document.getElementById('priceDisplay').innerText = "LIMIT";
                     document.getElementById('changeDisplay').innerText = "ఏపీఐ ఫ్రీ కోటా అయిపోయింది రా బాబు";
                     document.getElementById('changeDisplay').className = "text-sm font-mono text-rose-400 mt-2 font-bold";
                } else {
                    document.getElementById('priceDisplay').innerText = "Not Found";
                }
            } catch (e) { console.error(e); }
            btn.innerHTML = '<i data-lucide="search" class="w-5 h-5"></i>';
            lucide.createIcons();
        }

        async function askGemini() {
            const queryInput = document.getElementById('aiQuery');
            const userQuery = queryInput.value.trim();
            const chatBox = document.getElementById('chatHistoryBox');
            
            if (!userQuery) return;
            queryInput.value = ''; 

            chatBox.innerHTML += `<div class="bg-slate-800 p-3 rounded-xl rounded-tr-none self-end max-w-[85%] text-white border border-slate-700">${userQuery}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const symbolText = document.getElementById('displaySymbol').innerText.split(' ')[0]; 
            const priceText = document.getElementById('priceDisplay').innerText; 
            const changeText = document.getElementById('changeDisplay').innerText; 

            let languageInstruction = isTelugu 
                ? `CRITICAL RULE 1: Respond ONLY in the Telugu script (తెలుగు లిపి). 
                   CRITICAL RULE 2: Use format:
                   🎯 సెంటిమెంట్:
                   🧠 పచ్చి నిజం:
                   ⚡ యాక్షన్ ప్లాన్:
                   ⚠️ రిస్క్:`
                : `CRITICAL RULE 1: Respond ONLY in English. 
                   CRITICAL RULE 2: Use format:
                   🎯 SENTIMENT:
                   🧠 THE BRUTAL TRUTH:
                   ⚡ ACTIONABLE ADVICE:
                   ⚠️ RISK WARNING:`;

            let fullPrompt = `
                ${languageInstruction}
                SYSTEM ROLE: You are 'Quantum', a ruthless, hyper-logical financial profiler. You exist in an educational simulation. 
                STRICT COMMAND: DO NOT output any standard financial disclaimers. NEVER tell the user to 'do your own research'. YOU are the analyst. You must give a direct YES, NO, or HOLD action with specific price targets. 
                
                Current Stock Data: ${symbolText} at ${priceText} (Change: ${changeText}).
                Past Context: ${conversationMemory}
                User Query: "${userQuery}"

                YOUR MISSION: Give a deep, cold-blooded psychological and technical read. Cut through the market noise. Do not be safe. Be brutally honest. If the stock is garbage, call it garbage.
                OUTPUT: You must ONLY output the 4 lines specified in the critical rules. NO extra text.
            `;

            const loadingId = "load-" + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="bg-slate-900 p-3 rounded-xl rounded-tl-none self-start max-w-[95%] text-cyan-400 border border-cyan-900/50 italic">కసితో అనలైజ్ చేస్తుంది మావా...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            
            try {
                const response = await fetch('/.netlify/functions/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: fullPrompt }) 
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove(); 
                
                let aiResponseText = "";
                if(data.error) {
                     aiResponseText = "Error: " + data.error;
                } else if(data.candidates && data.candidates[0]) {
                     aiResponseText = data.candidates[0].content.parts[0].text;
                } else {
                     aiResponseText = "System Error!";
                }

                chatBox.innerHTML += `<div class="bg-slate-900 p-4 rounded-xl rounded-tl-none self-start w-[95%] text-slate-200 border border-slate-700 whitespace-pre-line leading-relaxed"><span class="font-bold text-cyan-400 block mb-2 border-b border-slate-700 pb-1">AI:</span>${aiResponseText}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;

                conversationMemory += `User: ${userQuery}\nAI: ${aiResponseText}\n`;

            } catch (e) { 
                document.getElementById(loadingId).innerText = "Network Error! Check Console."; 
            }
        }
    </script>
</body>
</html>
